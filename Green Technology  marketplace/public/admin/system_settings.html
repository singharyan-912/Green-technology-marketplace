<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings - GreenTech Admin</title>
    <link rel="stylesheet" href="../css/content/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../asset/admin-logo.png" style="width:50px; height:50px;" class="logo-icon" alt="Logo">
                <h2>Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="admin.html" data-section="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="user_management.html" data-section="user-management"><i class="fas fa-users"></i> User Management</a></li>
                    <li><a href="product_listing.html" data-section="product-listings"><i class="fas fa-boxes"></i> Product Listings</a></li>
                    <li><a href="order-management.html" data-section="order-management"><i class="fas fa-shopping-cart"></i> Order Management</a></li>
                    <li class="active"><a href="system_settings.html" data-section="system-settings"><i class="fas fa-cog"></i> System Settings</a></li>
                    <li><a href="review_overview.html" data-section="review-overview"><i class="fas fa-comments"></i> Review Overview</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="admin-profile"><i class="fas fa-user-circle"></i> <span>Admin</span></div>
                <div class="header-actions">
                    <button class="login-button logout-button">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </header>

            <section id="system-settings" class="dashboard-section active-section">
                <h2>System Settings</h2>
                <div class="card">
                    <div class="card-header"><h3>General Settings</h3></div>
                    <div class="card-body">
                        <form id="generalSettingsForm">
                            <div class="input-group">
                                <label for="siteName">Site Name</label>
                                <input type="text" id="siteName" placeholder="Loading...">
                            </div>
                            <div class="input-group">
                                <label for="contactEmail">Contact Email</label>
                                <input type="email" id="contactEmail" placeholder="Loading...">
                            </div>
                            <div class="input-group checkbox-group">
    <label for="allowNewRegistrations">Allow New User Registrations</label>
    <input type="checkbox" id="allowNewRegistrations">
</div>
                            <button type="submit" class="login-button">Save Settings</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="../js/admin.js"></script>
</body>
</html>
