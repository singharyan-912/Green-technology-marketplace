<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - VendorPanel</title>
    <link rel="stylesheet" href="../css/content/vendor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container" id="dashboardContainer">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="../asset/vendor-logo.png" style="width:50px; height:50px;" class="logo-icon" alt="Logo">
                    <span>VendorPanel</span>
                </div>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> <span>Dashboard</span></a></li>
                    <li><a href="vendor_products.html" class="nav-item"><i class="fas fa-box"></i> <span>Products</span></a></li>
                    <li><a href="vendor_add_product.html" class="nav-item"><i class="fas fa-plus-circle"></i> <span>Add Product</span></a></li>
                    <li><a href="vendor_orders.html" class="nav-item"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
                    <li><a href="vendor_sales_analytics.html" class="nav-item"><i class="fas fa-chart-pie"></i> <span>Analytics</span></a></li>
                    <li><a href="vendor_settings.html" class="nav-item active"><i class="fas fa-sliders-h"></i> <span>Settings</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
            </div>
        </aside>

        <main class="main-content" id="mainContent">
            <header class="dashboard-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                    <div class="page-title">
                        <h2>Account Settings</h2>
                        <p>Update your business profile and preferences.</p>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="notification-bell"><i class="far fa-bell"></i><span class="dot"></span></div>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name">Green Vendor</span>
                            <span class="user-role">Premium Seller</span>
                        </div>
                        <div class="user-avatar">V</div>
                    </div>
                </div>
            </header>

            <div class="settings-wrapper">
                <!-- Settings Content (Unchanged) -->
                <div class="settings-section card">
                    <div class="settings-header" onclick="this.parentElement.classList.toggle('active')">
                        <div class="header-info">
                            <i class="fas fa-user-circle"></i>
                            <span>Profile Information</span>
                        </div>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="settings-content">
                        <form id="vendorProfileForm" class="modern-form">
                            <div class="form-group"><label>Business Name</label><input type="text" id="vendorName"></div>
                            <div class="form-group"><label>Email Address</label><input type="email" id="vendorEmail"></div>
                            <div class="form-actions"><button type="submit" class="btn-primary">Update Profile</button></div>
                        </form>
                    </div>
                </div>

                <div class="settings-section card">
                    <div class="settings-header" onclick="this.parentElement.classList.toggle('active')">
                        <div class="header-info">
                            <i class="fas fa-credit-card"></i>
                            <span>Payout Settings</span>
                        </div>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="settings-content">
                        <form id="vendorPaymentForm" class="modern-form">
                            <div class="form-group"><label>Bank Name</label><input type="text" id="bankName"></div>
                            <div class="form-group"><label>Account Number</label><input type="text" id="accountNumber"></div>
                            <div class="form-actions"><button type="submit" class="btn-primary">Save Payout Details</button></div>
                        </form>
                    </div>
                </div>

                <div class="settings-section card">
                    <div class="settings-header" onclick="this.parentElement.classList.toggle('active')">
                        <div class="header-info">
                            <i class="fas fa-lock"></i>
                            <span>Security</span>
                        </div>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="settings-content">
                        <form id="vendorPasswordForm" class="modern-form">
                            <div class="form-group"><label>New Password</label><input type="password" id="newPassword"></div>
                            <div class="form-actions"><button type="submit" class="btn-primary">Change Password</button></div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="../js/vendor.js"></script>
    <script>
        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('dashboardContainer').classList.toggle('sidebar-closed');
        });
    </script>
</body>
</html>
