<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - GreenTech Admin</title>
    <link rel="stylesheet" href="../css/content/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../asset/admin-logo.png" style="width:50px; height:50px;" class="logo-icon" alt="Logo">
                <h2>Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="admin.html" data-section="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li class="active"><a href="user_management.html" data-section="user-management"><i class="fas fa-users"></i> User Management</a></li>
                    <li><a href="product_listing.html" data-section="product-listings"><i class="fas fa-boxes"></i> Product Listings</a></li>
                    <li><a href="order-management.html" data-section="order-management"><i class="fas fa-shopping-cart"></i> Order Management</a></li>
                    <li><a href="system_settings.html" data-section="system-settings"><i class="fas fa-cog"></i> System Settings</a></li>
                    <li><a href="review_overview.html" data-section="review-overview"><i class="fas fa-comments"></i> Review Overview</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="admin-profile"><i class="fas fa-user-circle"></i> <span>Admin</span></div>
                <div class="header-actions">
                    <button class="login-button logout-button">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </header>

            <section id="user-management" class="dashboard-section active-section">
                <h2>User Management</h2>
                <div class="card">
                    <div class="card-header">
                        <h3>Registered Users</h3>
                        <button class="login-button" id="addUserBtn"><i class="fas fa-plus"></i> Add New User</button>
                    </div>
                    <div class="card-body">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody">
                                <!-- Dynamic Data from Firebase -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <!-- Add User Modal -->
<div id="userModal" class="modal">
    <div class="modal-content">
        <div class="card-header">
            <h3>Add New User</h3>
            <span class="close-modal">&times;</span>
        </div>
        <form id="addUserForm" class="card-body">
            <div class="input-group">
                <label for="newUserName">Full Name</label>
                <input type="text" id="newUserName" required placeholder="Enter name">
            </div>
            <div class="input-group">
                <label for="newUserEmail">Email Address</label>
                <input type="email" id="newUserEmail" required placeholder="Enter email">
            </div>
            <div class="input-group">
                <label for="newUserRole">Role</label>
                <select id="newUserRole">
                    <option value="customer">Customer</option>
                    <option value="vendor">Vendor</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button type="submit" class="login-button">Save User</button>
                <button type="button" class="login-button logout-button" id="cancelUserBtn">Cancel</button>
            </div>
        </form>
    </div>
</div>
    <script type="module" src="../js/admin.js"></script>
</body>
</html>
