<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Green Tech</title>
    <link rel="stylesheet" href="./css/style.css">
    <script type="module" src="./js/script.js"></script>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <!-- New Branding Section -->
            <div class="auth-visual">
                <h1>Leading the Green Revolution.</h1>
                <p>Access the world's most sustainable marketplace for sustainable technology.</p>
            </div>

            <!-- Existing Form Structure -->
            <div class="auth-form-content">
                <h2 class="form-title">Welcome Back</h2>
                <p class="form-subtitle" id="loginSubtitle">Log in to your account</p>

                <div class="role-selection">
                    <button type="button" class="role-button active" id="customerLoginBtn" data-role="customer">Customer</button>
                    <button type="button" class="role-button" id="vendorLoginBtn" data-role="vendor">Vendor</button>
                    <button type="button" class="role-button" id="adminLoginBtn" data-role="admin">Admin</button>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="name@company.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="login-button">Sign In</button>
                </form>
                <p class="signup-link">New here? <a href="signup.html">Create an account</a></p>
            </div>
        </div>
    </div>
</body>
</html>
