<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - VendorPanel</title>
    <link rel="stylesheet" href="../css/content/vendor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container" id="dashboardContainer">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="../asset/vendor-logo.png" style="width:50px; height:50px;" class="logo-icon" alt="Logo">
                    <span>VendorPanel</span>
                </div>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> <span>Dashboard</span></a></li>
                    <li><a href="vendor_products.html" class="nav-item"><i class="fas fa-box"></i> <span>Products</span></a></li>
                    <li><a href="vendor_add_product.html" class="nav-item active"><i class="fas fa-plus-circle"></i> <span>Add Product</span></a></li>
                    <li><a href="vendor_orders.html" class="nav-item"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a></li>
                    <li><a href="vendor_sales_analytics.html" class="nav-item"><i class="fas fa-chart-pie"></i> <span>Analytics</span></a></li>
                    <li><a href="vendor_settings.html" class="nav-item"><i class="fas fa-sliders-h"></i> <span>Settings</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content" id="mainContent">
            <header class="dashboard-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                    <div class="page-title">
                        <h2>Add New Product</h2>
                        <p>List a new green technology product to the marketplace.</p>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="notification-bell"><i class="far fa-bell"></i><span class="dot"></span></div>
                    <div class="user-profile">
                        <div class="user-info">
                            <span class="user-name">Green Vendor</span>
                            <span class="user-role">Premium Seller</span>
                        </div>
                        <div class="user-avatar">V</div>
                    </div>
                </div>
            </header>

            <div class="card">
                <form id="vendorForm" class="modern-form">
                    <div class="form-grid">
                        <!-- Row 1: Name (Full Width) -->
                        <div class="form-group full-width">
                            <label for="productName">Product Name</label>
                            <input type="text" id="productName" name="productName" placeholder="e.g., Eco-Friendly Bamboo Toothbrush" required>
                        </div>

                        <!-- Row 2: Description (Full Width) -->
                        <div class="form-group full-width">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" placeholder="Provide a detailed description of your product..."></textarea>
                        </div>

                        <!-- Row 3: Category & Price -->
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" name="category" required>
                                <option value="">Select a Category</option>
                                <option value="Solar Energy">Solar Energy</option>
                                <option value="Wind Power">Wind Power</option>
                                <option value="Energy Storage">Energy Storage</option>
                                <option value="Eco Appliances">Eco Appliances</option>
                                <option value="Home Goods">Home Goods</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Personal Care">Personal Care</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="price">Price ($)</label>
                            <input type="number" id="price" name="price" step="0.01" placeholder="e.g., 12.99" required>
                        </div>

                       
                        <!-- Row 4: Stock (Status Field Removed) -->
<div class="form-group full-width">
    <label for="stock">Stock Quantity</label>
    <input type="number" id="stock" name="stock" placeholder="e.g., 100" required>
</div>

<!-- Row 5: Image URL (Full Width) -->
<div class="form-group full-width">
    <label for="imageURL">Product Image URL</label>
    <input type="url" id="imageURL" name="imageURL" placeholder="https://example.com/image.jpg">
    <span class="helper-text">Enter a direct link to a high-quality product image.</span>
</div>

                    <div class="form-actions">
                        <button type="button" class="cancel-button" onclick="window.location.href='vendor_products.html'">Cancel</button>
                        <button type="submit" class="save-button">Save Product</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script type="module" src="../js/vendor.js"></script>
    <script>
        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('dashboardContainer').classList.toggle('sidebar-closed');
        });
    </script>
</body>
</html>
