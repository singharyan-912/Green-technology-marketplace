<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Green Tech</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <div class="signup-box">
            <div class="auth-visual">
                <h1>Join the Future.</h1>
                <p>Start your journey as a sustainable consumer or innovator today.</p>
            </div>

            <div class="auth-form-content">
                <h2 class="form-title">Get Started</h2>
                <p class="form-subtitle" id="signupSubtitle">Register as a Customer</p>

                <div class="role-selection">
                    <button type="button" class="role-button active" id="customerSignupBtn" data-role="customer">Customer</button>
                    <button type="button" class="role-button" id="vendorSignupBtn" data-role="vendor">Vendor</button>
                    <button type="button" class="role-button" id="adminSignupBtn" data-role="admin">Admin</button>
                </div>

                <form id="signupForm">
                    <!-- Compact Row -->
                    <div class="form-row">
                        <div class="input-group" style="flex: 1;">
                            <label>First Name</label>
                            <input type="text" id="firstName" placeholder="John" required>
                        </div>
                        <div class="input-group" style="flex: 1;">
                            <label>Last Name</label>
                            <input type="text" id="lastName" placeholder="Doe" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="signupEmail" placeholder="john@example.com" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="••••••••" required>
                    </div>

                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="signup-button">Create Account</button>
                </form>
                <p class="login-link">Already a member? <a href="index.html">Log In</a></p>
            </div>
        </div>
    </div>
    <script type="module" src="./js/firebase.js"></script>
    <script type="module" src="./js/signup.js"></script>
</body>
</html>
