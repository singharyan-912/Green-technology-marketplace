<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - GreenTech Admin</title>
    <link rel="stylesheet" href="../css/content/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../asset/admin-logo.png" style="width:50px; height:50px;" class="logo-icon" alt="Logo">
                <h2>Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="user_management.html"><i class="fas fa-users"></i> User Management</a></li>
                    <li><a href="product_listing.html"><i class="fas fa-boxes"></i> Product Listings</a></li>
                    <li class="active"><a href="order-management.html"><i class="fas fa-shopping-cart"></i> Order Management</a></li>
                    <li><a href="system_settings.html"><i class="fas fa-cog"></i> System Settings</a></li>
                    <li><a href="review_overview.html"><i class="fas fa-comments"></i> Review Overview</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="admin-profile"><i class="fas fa-user-circle"></i> <span>Admin</span></div>
                <div class="header-actions">
                    <button class="login-button logout-button"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </header>

            <section id="order-management" class="dashboard-section active-section">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Order Management</h2>
                    <!-- FILTER CONTROLS -->
                    <div class="filter-bar" style="display: flex; gap: 10px;">
                        <select id="statusFilter" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
                            <option value="all">All Statuses</option>
                            <option value="pending">Pending</option>
                            <option value="Shipped">Shipped</option>
                            <option value="Fulfilled">Fulfilled</option>
                        </select>
                        <input type="date" id="dateFilter" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
                        <button id="clearFilters" style="padding: 8px 12px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer;">Reset</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="orderTableBody">
                                <tr><td colspan="6" style="text-align:center; padding: 20px;">Loading orders...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="../js/admin.js"></script>
</body>
</html>
