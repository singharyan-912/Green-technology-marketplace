<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | GreenTech</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/content/customer.css">
    <link rel="stylesheet" href="../css/content/products-listing.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo" onclick="window.location.href='customer.html'" style="cursor:pointer">
                <img src="../asset/site_logo.jpg" alt="Logo" class="logo-icon">
                <span class="logo-text">Green<span>Tech</span></span>
            </div>
            <div class="search-bar">
                <input type="text" id="main-search-input" placeholder="Search eco-friendly products...">
                <button class="search-button" id="search-trigger">🔍</button>
            </div>
            <nav class="main-nav">
    <ul>
        <li><a href="customer.html">Home</a></li>
        <li class="dropdown">
            <a href="#">Products ▾</a>
            <div class="dropdown-content">
                <a href="products-listing.html?search=Electronics">Electronics</a>
                <a href="products-listing.html?search=Home Goods">Home Goods</a>
                <a href="products-listing.html?search=Solar Tech">Solar Tech</a>
            </div>
        </li>
    </ul>
</nav>

<!-- Place user-actions parallel to the nav, not inside it -->
<div class="user-actions">
    <div class="action-icon" id="wishlist-trigger">
        <img src="../asset/e-commerce.png" alt="Wishlist">
        <span class="badge" id="wishlist-count">0</span>
    </div>
    <div class="action-icon">
        <img src="../asset/shopping-cart.png" alt="Cart">
        <span class="badge" id="cart-count">0</span>
    </div>
</div>
        </div>
    </header>

    <div class="listing-layout">
        <!-- SIDEBAR FILTERS -->
        <aside class="filters-sidebar">
            <h3>Filters</h3>
            
            <div class="filter-section">
                <p class="filter-label">CATEGORIES</p>
                <div id="category-filters">
                    <label><input type="checkbox" class="filter-cat" value="Electronics"> Electronics</label>
                    <label><input type="checkbox" class="filter-cat" value="Home Goods"> Home Goods</label>
                    <label><input type="checkbox" class="filter-cat" value="Outdoor"> Outdoor</label>
                     <label><input type="checkbox" class="filter-cat" value="Wind Power">Wind Power</label>
                      <label><input type="checkbox" class="filter-cat" value="Home Goods"> Home Goods</label>
                       <label><input type="checkbox" class="filter-cat" value="Personal Care"> Personal Care</label>
                       <label><input type="checkbox" class="filter-cat" value="Eco Appliances"> Eco Appliances</label>
                </div>
            </div>

            <div class="filter-section">
                <p class="filter-label">CUSTOMER RATINGS</p>
                <label><input type="radio" name="rating" class="filter-rating" value="4"> 4★ & above</label>
                <label><input type="radio" name="rating" class="filter-rating" value="3"> 3★ & above</label>
                <label><input type="radio" name="rating" class="filter-rating" value="0" checked> Any Rating</label>
            </div>

            <div class="filter-section">
    <p class="filter-label">MAX PRICE ($)</p>
    <!-- Updated max to 1,000,000 and added a step for smoother scrolling -->
    <input type="range" id="price-range" min="0" max="1000000" step="1000" value="1000000" style="width:100%">
    <span id="price-val">$1000000</span>
</div>

            <button class="black-btn" id="apply-filters-btn" style="width:100%; margin-top:10px;">Apply Filters</button>
        </aside>

        <!-- MAIN RESULTS AREA -->
        <main class="results-container">
            <nav class="breadcrumb">
                <a href="customer.html">Home</a> <span>&rsaquo;</span> 
                <a href="products-listing.html">Green Tech</a> <span>&rsaquo;</span> 
                <span id="breadcrumb-current">All Products</span>
            </nav>

            <h2 id="search-status-text">Loading Products...</h2>
            
            <div class="sort-bar" id="sort-options">
                <span>Sort By</span>
                <button class="sort-btn active" data-sort="relevance">Relevance</button>
                <button class="sort-btn" data-sort="price-low">Price -- Low to High</button>
                <button class="sort-btn" data-sort="price-high">Price -- High to Low</button>
            </div>

            <div class="listing-grid" id="listing-results-grid">
                <!-- Products via JS -->
            </div>
        </main>
    </div>

    <script type="module" src="../js/products-listing.js"></script>
</body>
</html>
