<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Listings - GreenTech Admin</title>
    <link rel="stylesheet" href="../css/content/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../asset/admin-logo.png" style="width:50px; height:50px;" class="logo-icon" alt="Logo">
                <h2>Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="admin.html" data-section="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="user_management.html" data-section="user-management"><i class="fas fa-users"></i> User Management</a></li>
                    <li class="active"><a href="product_listing.html" data-section="product-listings"><i class="fas fa-boxes"></i> Product Listings</a></li>
                    <li><a href="order-management.html" data-section="order-management"><i class="fas fa-shopping-cart"></i> Order Management</a></li>
                    <li><a href="system_settings.html" data-section="system-settings"><i class="fas fa-cog"></i> System Settings</a></li>
                    <li><a href="review_overview.html" data-section="review-overview"><i class="fas fa-comments"></i> Review Overview</a></li>
                </ul>
            </nav>
        </aside>

        <!-- ... rest of header ... -->

<main class="main-content">
    <header class="main-header">
        <div class="admin-profile"><i class="fas fa-user-circle"></i> <span>Admin</span></div>
        <div class="header-actions">
            <button class="login-button logout-button">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </header>

    <!-- ADDED 'active-section' HERE SO THE DATA LOADS AUTOMATICALLY -->
    <section id="product-listings" class="dashboard-section active-section">
        <h2>Product Listings Management</h2>
        <div class="card">
            <div class="card-header"><h3>Approved Listings</h3></div>
            <div class="card-body">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Product Name</th>
                            <th>Seller</th>
                            <th>Category</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="approvedProductsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card" style="margin-top: 30px;">
            <div class="card-header"><h3>Pending Approvals</h3></div>
            <div class="card-body">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Product Name</th>
                            <th>Seller</th>
                            <th>Category</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pendingProductsTableBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<!-- ... rest of file ... -->
    </div>
    <script type="module" src="../js/admin.js"></script>
</body>
</html>
